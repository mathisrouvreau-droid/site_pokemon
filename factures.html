<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mes Factures — Holofoil</title>
  <meta name="description" content="Consultez et téléchargez vos factures Holofoil.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .factures-page { padding: 80px 0 60px; }
    .factures-container { max-width: 900px; margin: 0 auto; padding: 0 24px; }
    .factures-header { text-align: center; margin-bottom: 40px; }
    .factures-header h1 { font-family: var(--font-display); font-size: 2.2rem; font-weight: 800; margin-bottom: 8px; }
    .factures-header p { color: var(--text-muted); font-size: 0.88rem; }
    .factures-back {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 0.82rem; color: var(--text-muted); margin-bottom: 24px;
      text-decoration: none; transition: color 0.2s;
    }
    .factures-back:hover { color: var(--text-primary); }

    .factures-list { display: flex; flex-direction: column; gap: 16px; }

    .facture-card {
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 24px;
      backdrop-filter: blur(12px);
      transition: border-color 0.3s;
    }
    .facture-card:hover { border-color: rgba(77,201,246,0.15); }

    .facture-top {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 16px; flex-wrap: wrap; gap: 12px;
    }
    .facture-id {
      font-family: var(--font-display); font-size: 0.95rem; font-weight: 700;
      color: var(--holo-1);
    }
    .facture-date { font-size: 0.8rem; color: var(--text-muted); }
    .facture-badge {
      padding: 4px 12px; border-radius: 50px; font-size: 0.7rem;
      font-weight: 600; background: rgba(74,222,128,0.1);
      color: #4ade80; border: 1px solid rgba(74,222,128,0.2);
    }

    .facture-items {
      border-top: 1px solid rgba(255,255,255,0.04);
      padding-top: 14px; margin-bottom: 14px;
    }
    .facture-item-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 0; font-size: 0.84rem;
    }
    .facture-item-name { color: var(--text-secondary); flex: 1; }
    .facture-item-set { color: var(--text-muted); font-size: 0.78rem; margin-left: 12px; flex-shrink: 0; }
    .facture-item-price { color: var(--text-primary); font-weight: 600; min-width: 80px; text-align: right; }

    .facture-bottom {
      display: flex; justify-content: space-between; align-items: center;
      border-top: 1px solid rgba(255,255,255,0.06);
      padding-top: 14px; flex-wrap: wrap; gap: 12px;
    }
    .facture-total {
      font-family: var(--font-display); font-size: 1.2rem; font-weight: 800;
    }
    .facture-addr { font-size: 0.78rem; color: var(--text-muted); line-height: 1.5; }

    .facture-actions { display: flex; gap: 10px; }
    .facture-btn {
      padding: 8px 18px; border-radius: 50px; font-size: 0.78rem;
      font-weight: 600; cursor: pointer; transition: 0.3s;
      display: inline-flex; align-items: center; gap: 6px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03); color: var(--text-secondary);
    }
    .facture-btn:hover {
      border-color: rgba(77,201,246,0.25);
      color: var(--text-primary);
      background: rgba(77,201,246,0.06);
    }
    .facture-btn svg { width: 14px; height: 14px; }

    .empty-state {
      text-align: center; padding: 60px 20px;
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
    }
    .empty-state svg { width: 48px; height: 48px; color: var(--text-muted); margin-bottom: 16px; }
    .empty-state h3 { font-size: 1.1rem; font-weight: 700; margin-bottom: 8px; }
    .empty-state p { color: var(--text-muted); font-size: 0.85rem; }

    .login-prompt {
      text-align: center; padding: 80px 20px;
    }
    .login-prompt h2 { font-size: 1.3rem; font-weight: 700; margin-bottom: 12px; }
    .login-prompt p { color: var(--text-muted); font-size: 0.88rem; margin-bottom: 24px; }
    .login-prompt a {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 12px 28px; border-radius: 50px; font-size: 0.88rem; font-weight: 600;
      background: linear-gradient(135deg, #4dc9f6, #7c3aed);
      color: #fff; text-decoration: none; transition: 0.3s;
    }
    .login-prompt a:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(77,201,246,0.25); }

    @media (max-width: 768px) {
      .factures-header h1 { font-size: 1.6rem; }
      .facture-card { padding: 18px; }
      .facture-top { flex-direction: column; align-items: flex-start; }
      .facture-bottom { flex-direction: column; align-items: flex-start; }
    }
    @media (max-width: 480px) {
      .factures-page { padding: 60px 0 40px; }
      .factures-header h1 { font-size: 1.3rem; }
      .factures-header p { font-size: 0.78rem; }
      .facture-card { padding: 14px; border-radius: 12px; }
      .facture-id { font-size: 0.82rem; }
      .facture-date { font-size: 0.72rem; }
      .facture-item-row { font-size: 0.78rem; }
      .facture-item-price { min-width: 60px; font-size: 0.78rem; }
      .facture-total { font-size: 1rem; }
      .facture-btn { padding: 6px 14px; font-size: 0.72rem; }
      .facture-actions { width: 100%; }
      .facture-btn { flex: 1; justify-content: center; }
      .login-prompt { padding: 50px 16px; }
    }
  </style>
</head>
<body>

  <main class="page-content">
    <div class="factures-page">
      <div class="factures-container">

        <a href="compte.html" class="factures-back">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5"/></svg>
          Retour à mon compte
        </a>

        <div class="factures-header">
          <h1><span class="holo-text">Mes Factures</span></h1>
          <p>Retrouvez l'ensemble de vos factures et téléchargez-les au format PDF.</p>
        </div>

        <div id="facturesContent"></div>

      </div>
    </div>
  </main>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/db.js"></script>
  <script src="js/data.js"></script>
  <script src="js/components.js"></script>
  <script src="js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      injectFooter();
      renderFactures();
    });

    function renderFactures() {
      const container = document.getElementById('facturesContent');
      const session = JSON.parse(localStorage.getItem('holofoil_user_session') || 'null');

      if (!session) {
        container.innerHTML = `
          <div class="login-prompt">
            <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" style="color:var(--text-muted);margin-bottom:16px;"><path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z"/></svg>
            <h2>Connectez-vous</h2>
            <p>Vous devez être connecté pour accéder à vos factures.</p>
            <a href="compte.html">Se connecter</a>
          </div>`;
        return;
      }

      const orders = JSON.parse(localStorage.getItem('holofoil_orders') || '[]')
        .filter(o => o.email === session.email)
        .sort((a, b) => (b.ts || 0) - (a.ts || 0));

      if (orders.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/></svg>
            <h3>Aucune facture</h3>
            <p>Vous n'avez pas encore passé de commande.</p>
          </div>`;
        return;
      }

      container.innerHTML = `
        <p style="font-size:0.82rem;color:var(--text-muted);margin-bottom:20px;">${orders.length} facture${orders.length > 1 ? 's' : ''}</p>
        <div class="factures-list">
          ${orders.map(o => {
            const details = o.details || [];
            const addr = [o.userAddress, o.userZip, o.userCity].filter(Boolean).join(', ');
            return `
              <div class="facture-card">
                <div class="facture-top">
                  <div>
                    <div class="facture-id">${o.id}</div>
                    <div class="facture-date">${o.date}${o.userName && o.userName.trim() ? ' — ' + o.userName.trim() : ''}</div>
                  </div>
                  <div style="display:flex;align-items:center;gap:10px;">
                    <span class="facture-badge">Payée</span>
                  </div>
                </div>

                <div class="facture-items">
                  ${details.map(d => `
                    <div class="facture-item-row">
                      <span class="facture-item-name">${d.name}</span>
                      ${d.set ? `<span class="facture-item-set">${d.set}</span>` : ''}
                      <span class="facture-item-price">${parseFloat(d.price).toFixed(2)} &euro;</span>
                    </div>
                  `).join('')}
                  ${details.length === 0 ? `<div class="facture-item-row"><span class="facture-item-name" style="color:var(--text-muted);">${o.items} article${o.items > 1 ? 's' : ''}</span><span class="facture-item-price">${parseFloat(o.total).toFixed(2)} &euro;</span></div>` : ''}
                </div>

                <div class="facture-bottom">
                  <div>
                    <div class="facture-total">${parseFloat(o.total).toFixed(2)} &euro;</div>
                    ${addr ? `<div class="facture-addr">${addr}</div>` : ''}
                  </div>
                  <div class="facture-actions">
                    <button class="facture-btn" onclick="downloadFacture('${o.id}')">
                      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3"/></svg>
                      Télécharger PDF
                    </button>
                  </div>
                </div>
              </div>`;
          }).join('')}
        </div>`;
    }

    // ─── GÉNÉRATION PDF ───
    function downloadFacture(orderId) {
      const orders = JSON.parse(localStorage.getItem('holofoil_orders') || '[]');
      const order = orders.find(o => o.id === orderId);
      if (!order) { showToast('Facture introuvable'); return; }

      const details = order.details || [];
      const addr = [order.userAddress, order.userZip, order.userCity].filter(Boolean).join(', ');

      const invoiceHTML = `
        <html><head><meta charset="UTF-8"><title>Facture ${order.id}</title>
        <style>
          * { margin: 0; padding: 0; box-sizing: border-box; }
          body { font-family: 'Segoe UI', Arial, sans-serif; color: #1a1a2e; padding: 48px; font-size: 13px; }
          .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 40px; padding-bottom: 24px; border-bottom: 2px solid #e5e7eb; }
          .logo { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; }
          .logo span { background: linear-gradient(135deg, #4dc9f6, #a855f7, #f97316); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
          .invoice-info { text-align: right; }
          .invoice-info h2 { font-size: 22px; font-weight: 700; color: #4dc9f6; margin-bottom: 6px; }
          .invoice-info p { color: #6b7280; font-size: 12px; }
          .parties { display: flex; justify-content: space-between; margin-bottom: 36px; }
          .party h4 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: #9ca3af; margin-bottom: 8px; }
          .party p { font-size: 13px; line-height: 1.6; }
          table { width: 100%; border-collapse: collapse; margin-bottom: 24px; }
          thead th { text-align: left; padding: 10px 12px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: #6b7280; border-bottom: 2px solid #e5e7eb; }
          thead th:last-child { text-align: right; }
          tbody td { padding: 12px; border-bottom: 1px solid #f3f4f6; }
          tbody td:last-child { text-align: right; font-weight: 600; }
          .total-row { display: flex; justify-content: flex-end; margin-bottom: 40px; }
          .total-box { text-align: right; }
          .total-box .label { font-size: 12px; color: #6b7280; margin-bottom: 4px; }
          .total-box .amount { font-size: 28px; font-weight: 800; }
          .footer { text-align: center; color: #9ca3af; font-size: 11px; border-top: 1px solid #e5e7eb; padding-top: 20px; }
        </style></head><body>
          <div class="header">
            <div class="logo"><span>HOLOFOIL</span></div>
            <div class="invoice-info">
              <h2>FACTURE</h2>
              <p><strong>${order.id}</strong></p>
              <p>${order.date}</p>
            </div>
          </div>

          <div class="parties">
            <div class="party">
              <h4>Vendeur</h4>
              <p><strong>HOLOFOIL SAS</strong><br>47 rue Vivienne<br>75002 Paris<br>contact@holofoil.fr</p>
            </div>
            <div class="party" style="text-align:right;">
              <h4>Client</h4>
              <p>${order.userName ? `<strong>${order.userName.trim()}</strong><br>` : ''}${addr ? addr + '<br>' : ''}${order.email}</p>
            </div>
          </div>

          <table>
            <thead><tr><th>Article</th><th>Extension</th><th>Prix</th></tr></thead>
            <tbody>
              ${details.length > 0
                ? details.map(d => `<tr><td>${d.name}</td><td style="color:#6b7280;">${d.set || '—'}</td><td>${parseFloat(d.price).toFixed(2)} &euro;</td></tr>`).join('')
                : `<tr><td>${order.items} article${order.items > 1 ? 's' : ''}</td><td>—</td><td>${parseFloat(order.total).toFixed(2)} &euro;</td></tr>`
              }
            </tbody>
          </table>

          <div class="total-row">
            <div class="total-box">
              <div class="label">Total TTC</div>
              <div class="amount">${parseFloat(order.total).toFixed(2)} &euro;</div>
            </div>
          </div>

          <div class="footer">
            <p>HOLOFOIL SAS — 47 rue Vivienne, 75002 Paris — contact@holofoil.fr</p>
            <p style="margin-top:4px;">Merci pour votre confiance.</p>
          </div>
        </body></html>`;

      const printWindow = window.open('', '_blank');
      printWindow.document.write(invoiceHTML);
      printWindow.document.close();
      printWindow.onload = () => {
        printWindow.print();
      };
    }
  </script>
</body>
</html>
