<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Holofoil</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>

  <!-- Ambient BG -->
  <div class="ambient-bg">
    <div class="orb"></div>
    <div class="orb"></div>
    <div class="orb"></div>
  </div>

  <!-- ═══════════════ LOGIN PAGE ═══════════════ -->
  <div class="login-page" id="loginPage" style="position:relative;z-index:1;">
    <div class="login-card">
      <div class="logo holo-text">HOLOFOIL</div>
      <p class="subtitle">Panneau d'administration</p>

      <div class="login-error" id="loginError"></div>

      <form onsubmit="event.preventDefault();attemptLogin();">
        <div class="form-group" style="margin-bottom:20px;">
          <label class="form-label" style="font-size:0.8rem;">Email</label>
          <input type="email" class="form-input" id="loginEmail" placeholder="votre@email.com" autocomplete="email" required>
        </div>
        <div class="form-group" style="margin-bottom:28px;">
          <label class="form-label" style="font-size:0.8rem;">Mot de passe</label>
          <input type="password" class="form-input" id="loginPassword" placeholder="••••••••" autocomplete="current-password" required>
        </div>
        <button type="submit" class="admin-save-btn">Se connecter</button>
      </form>

      <p style="text-align:center;margin-top:24px;">
        <a href="index.html" style="font-size:0.8rem;color:var(--text-muted);text-decoration:underline;text-underline-offset:3px;">← Retour au site</a>
      </p>
    </div>
  </div>

  <!-- ═══════════════ ADMIN DASHBOARD ═══════════════ -->
  <div class="admin-layout" id="adminLayout">

    <!-- Sidebar -->
    <aside class="admin-sidebar">
      <div class="admin-sidebar-logo holo-text">HOLOFOIL</div>
      <div class="admin-sidebar-email" id="adminEmail"></div>

      <ul class="admin-nav">
        <li>
          <a href="#" data-tab="cards" class="active" onclick="event.preventDefault();switchTab('cards')">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M20.25 7.5l-.625 10.632a2.25 2.25 0 01-2.247 2.118H6.622a2.25 2.25 0 01-2.247-2.118L3.75 7.5M10 11.25h4M3.375 7.5h17.25c.621 0 1.125-.504 1.125-1.125v-1.5c0-.621-.504-1.125-1.125-1.125H3.375c-.621 0-1.125.504-1.125 1.125v1.5c0 .621.504 1.125 1.125 1.125z"/></svg>
            Cartes en vente
          </a>
        </li>
        <li>
          <a href="#" data-tab="users" onclick="event.preventDefault();switchTab('users')">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19.128a9.38 9.38 0 002.625.372 9.337 9.337 0 004.121-.952 4.125 4.125 0 00-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 018.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0111.964-3.07M12 6.375a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0zm8.25 2.25a2.625 2.625 0 11-5.25 0 2.625 2.625 0 015.25 0z"/></svg>
            Accès admin
          </a>
        </li>
      </ul>

      <div class="admin-sidebar-footer">
        <a href="index.html" style="display:flex;align-items:center;gap:8px;font-size:0.8rem;color:var(--text-muted);margin-bottom:12px;transition:var(--transition);">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 6H5.25A2.25 2.25 0 003 8.25v10.5A2.25 2.25 0 005.25 21h10.5A2.25 2.25 0 0018 18.75V10.5m-10.5 6L21 3m0 0h-5.25M21 3v5.25"/></svg>
          Voir le site
        </a>
        <button class="admin-logout" onclick="logout()">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15m3 0l3-3m0 0l-3-3m3 3H9"/></svg>
          Déconnexion
        </button>
      </div>
    </aside>

    <!-- Main -->
    <div class="admin-main" id="adminMain"></div>

  </div>

  <script src="js/data.js"></script>
  <script src="js/main.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
