<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Boutique — Holofoil</title>
  <meta name="description" content="Parcourez notre collection de cartes Pokémon premium : nouveautés, best-sellers et cartes à l'unité.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/boutique.css">
</head>
<body>

  <main class="page-content">

    <!-- ═══ HERO ═══ -->
    <section class="boutique-hero">
      <div class="container">
        <h1><span class="holo-text">Boutique</span></h1>
        <p>Découvrez notre collection de cartes Pokémon premium</p>
      </div>
    </section>

    <!-- ═══ NOUVEAUTÉS ═══ -->
    <section class="nouveautes-section">
      <div class="container">
        <div class="section-header">
          <p class="section-label">Vient d'arriver</p>
          <h2 class="section-title">Nouveautés</h2>
        </div>
        <div class="scroll-row" id="nouveautesRow"></div>
      </div>
    </section>

    <!-- ═══ BEST SELLERS ═══ -->
    <section class="bestsellers-section">
      <div class="container">
        <div class="section-header">
          <p class="section-label">Populaire</p>
          <h2 class="section-title">Les Plus Vendus</h2>
        </div>
        <div class="bestsellers-grid" id="bestsellersGrid"></div>
      </div>
    </section>

    <!-- ═══ ALL CARDS ═══ -->
    <section class="allcards-section">
      <div class="container">
        <div class="section-header">
          <p class="section-label">Collection complète</p>
          <h2 class="section-title">Cartes à l'unité</h2>
        </div>
        <div class="filter-bar" id="filterBar">
          <select class="filter-select" id="typeFilter">
            <option value="all">Tous les types</option>
            <option value="Carte">Cartes</option>
            <option value="Booster">Boosters</option>
            <option value="ETB">ETB</option>
            <option value="Coffret">Coffrets</option>
            <option value="Display">Displays</option>
            <option value="Bundle">Bundles</option>
            <option value="Autre">Autre</option>
          </select>
          <select class="filter-select" id="setFilter">
            <option value="all">Tous les sets</option>
          </select>
          <select class="filter-select" id="rarityFilter">
            <option value="all">Toutes raretés</option>
          </select>
          <input type="text" class="filter-select" id="searchInput" placeholder="Rechercher un produit..." style="flex:1;min-width:200px;">
          <button class="filter-btn active" id="searchBtn" onclick="loadAllCards()">Rechercher</button>
        </div>
        <div id="paginationTop" style="display:flex;gap:12px;align-items:center;margin-bottom:20px;"></div>
        <div class="allcards-grid" id="allcardsGrid"></div>
      </div>
    </section>

  </main>

  <!-- Scripts -->
  <script src="js/data.js"></script>
  <script src="js/components.js"></script>
  <script src="js/main.js"></script>
  <script>
    let currentPage = 1;
    const perPage = 20;

    document.addEventListener('DOMContentLoaded', () => {
      injectFooter();

      // Build set filter from existing listings
      const listings = getAdminListings();
      const setSelect = document.getElementById('setFilter');
      const uniqueSets = [...new Set(listings.map(l => l.set).filter(Boolean))];
      uniqueSets.forEach(s => {
        const opt = document.createElement('option');
        opt.value = s;
        opt.textContent = s;
        setSelect.appendChild(opt);
      });

      // Build rarity filter from existing listings
      const raritySelect = document.getElementById('rarityFilter');
      const uniqueRarities = [...new Set(listings.map(l => l.rarity).filter(Boolean))];
      uniqueRarities.forEach(r => {
        const opt = document.createElement('option');
        opt.value = r;
        opt.textContent = r;
        raritySelect.appendChild(opt);
      });

      // Event listeners
      document.getElementById('typeFilter').addEventListener('change', () => { currentPage = 1; loadAllCards(); });
      document.getElementById('setFilter').addEventListener('change', () => { currentPage = 1; loadAllCards(); });
      document.getElementById('rarityFilter').addEventListener('change', () => { currentPage = 1; loadAllCards(); });
      document.getElementById('searchInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') { currentPage = 1; loadAllCards(); } });

      // Load sections
      loadNouveautes();
      loadBestsellers();
      loadAllCards();
    });

    function loadNouveautes() {
      const row = document.getElementById('nouveautesRow');
      const listings = getAdminListings();

      if (listings.length === 0) {
        row.innerHTML = '<p style="color:var(--text-muted);padding:20px;">Aucune carte disponible pour le moment.</p>';
        return;
      }

      // Show the most recent listings (newest first)
      row.innerHTML = listings.slice(0, 10).map((l, i) => buildListingHTML(l, i)).join('');
    }

    function loadBestsellers() {
      const grid = document.getElementById('bestsellersGrid');
      const listings = getAdminListings();

      if (listings.length === 0) {
        grid.innerHTML = '<p style="color:var(--text-muted);">Aucune carte en vente.</p>';
        return;
      }

      // Show top 4 most expensive as "best sellers"
      const sorted = [...listings].sort((a, b) => parseFloat(b.price) - parseFloat(a.price));
      grid.innerHTML = sorted.slice(0, 4).map((l, i) => buildListingHTML(l, i)).join('');
    }

    function loadAllCards() {
      const grid = document.getElementById('allcardsGrid');
      let listings = getAdminListings();

      // Apply type filter
      const typeVal = document.getElementById('typeFilter').value;
      if (typeVal !== 'all') {
        listings = listings.filter(l => (l.type || 'Carte') === typeVal);
      }

      // Apply search filter
      const searchVal = document.getElementById('searchInput').value.trim().toLowerCase();
      if (searchVal) {
        listings = listings.filter(l => l.name.toLowerCase().includes(searchVal));
      }

      // Apply rarity filter
      const rarityVal = document.getElementById('rarityFilter').value;
      if (rarityVal !== 'all') {
        listings = listings.filter(l => (l.rarity || '').toLowerCase().includes(rarityVal.toLowerCase()));
      }

      // Apply set filter
      const setVal = document.getElementById('setFilter').value;
      if (setVal !== 'all') {
        listings = listings.filter(l => (l.set || '').toLowerCase().includes(setVal.toLowerCase()));
      }

      // Pagination
      const total = listings.length;
      const start = (currentPage - 1) * perPage;
      const paged = listings.slice(start, start + perPage);

      if (paged.length > 0) {
        grid.innerHTML = paged.map((l, i) => buildListingHTML(l, start + i)).join('');
        buildPagination(total);
      } else {
        grid.innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:40px;">Aucune carte trouvée.</p>';
        document.getElementById('paginationTop').innerHTML = '';
      }
    }

    function buildPagination(total) {
      const pag = document.getElementById('paginationTop');
      const totalPages = Math.ceil(total / perPage);
      if (totalPages <= 1) { pag.innerHTML = ''; return; }
      const hasPrev = currentPage > 1;
      const hasNext = currentPage < totalPages;
      pag.innerHTML = `
        <button class="filter-btn" ${!hasPrev ? 'disabled style="opacity:0.3;pointer-events:none;"' : ''} onclick="currentPage--;loadAllCards();window.scrollTo({top:document.querySelector('.allcards-section').offsetTop-100,behavior:'smooth'})">← Précédent</button>
        <span style="font-size:0.85rem;color:var(--text-secondary);">Page ${currentPage} / ${totalPages}</span>
        <button class="filter-btn" ${!hasNext ? 'disabled style="opacity:0.3;pointer-events:none;"' : ''} onclick="currentPage++;loadAllCards();window.scrollTo({top:document.querySelector('.allcards-section').offsetTop-100,behavior:'smooth'})">Suivant →</button>
      `;
    }
  </script>
</body>
</html>
